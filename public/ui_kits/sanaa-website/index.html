<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sanaa Co. — Finance, Commerce, Logistics, Infrastructure</title>
<meta name="theme-color" content="#10b981">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%2310b981'/%3E%3Cg transform='translate(13 10) scale(0.18)' fill='%23ffffff'%3E%3Cpath d='M 158 14 C 210 18 232 70 224 130 C 218 178 188 212 142 218 C 102 222 76 198 70 162 C 64 124 86 78 118 44 C 130 28 144 16 158 14 Z'/%3E%3Cpath d='M 84 232 C 110 234 122 256 116 282 C 110 308 86 322 62 312 C 44 304 38 282 50 262 C 60 244 72 232 84 232 Z'/%3E%3C/g%3E%3C/svg%3E">

<!-- Google Fonts: Geist + Source Serif 4 + JetBrains Mono -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300..800&family=Source+Serif+4:opsz,wght@8..60,300..800&family=JetBrains+Mono:wght@300..700&display=swap" rel="stylesheet">

<style>
/* ============================================================
   Sanaa Design System — Colors & Type
   ============================================================ */

/* ------- COLOR TOKENS ------- */
:root {
  --emerald-50:  #ecfdf5;
  --emerald-100: #d1fae5;
  --emerald-200: #a7f3d0;
  --emerald-300: #6ee7b7;
  --emerald-400: #34d399;
  --emerald-500: #10b981;
  --emerald-600: #059669;
  --emerald-700: #047857;
  --emerald-800: #065f46;
  --emerald-900: #064e3b;
  --emerald-950: #022c22;

  --paper:       #fbfaf7;
  --paper-soft:  #f4f1ea;
  --stone-50:    #fafaf9;
  --stone-100:   #f5f5f4;
  --stone-200:   #e7e5e4;
  --stone-300:   #d6d3d1;
  --stone-400:   #a8a29e;
  --stone-500:   #78716c;
  --stone-600:   #57534e;
  --stone-700:   #44403c;
  --stone-800:   #292524;
  --stone-900:   #1c1917;
  --ink:         #0a0a09;

  --gold:        #c89b3c;
  --clay:        #b85c3c;
  --sky:         #2563eb;

  --success:     var(--emerald-600);
  --warning:     #d97706;
  --danger:      #b91c1c;
  --info:        var(--sky);
}

:root {
  --bg:          var(--paper);
  --bg-elev:     #ffffff;
  --bg-soft:     var(--paper-soft);
  --bg-inverse:  var(--ink);

  --fg-1:        var(--ink);
  --fg-2:        var(--stone-700);
  --fg-3:        var(--stone-500);
  --fg-mute:     var(--stone-400);
  --fg-inverse:  var(--paper);

  --border:      var(--stone-200);
  --border-strong: var(--stone-300);
  --border-ink:  var(--ink);

  --brand:       var(--emerald-500);
  --brand-fg:    #ffffff;
  --brand-hover: var(--emerald-600);
  --brand-press: var(--emerald-700);
  --brand-soft:  var(--emerald-50);

  --focus-ring:  var(--emerald-500);
}

/* ------- TYPE TOKENS ------- */
:root {
  --font-sans:    "Geist", ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
  --font-serif:   "Source Serif 4", "Source Serif Pro", Georgia, "Times New Roman", serif;
  --font-mono:    "JetBrains Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;

  --t-display-1: 700 clamp(48px, 7vw, 96px)/0.98 var(--font-sans);
  --t-display-2: 700 clamp(40px, 5.5vw, 72px)/1.02 var(--font-sans);

  --t-editorial-1: 400 clamp(36px, 4vw, 56px)/1.12 var(--font-serif);
  --t-editorial-2: 400 clamp(18px, 2vw, 24px)/1.5 var(--font-serif);

  --t-h1: 700 40px/1.1   var(--font-sans);
  --t-h2: 700 28px/1.2   var(--font-sans);
  --t-h3: 600 20px/1.3   var(--font-sans);
  --t-h4: 600 16px/1.35  var(--font-sans);

  --t-body:    400 16px/1.55 var(--font-sans);
  --t-body-lg: 400 18px/1.6  var(--font-sans);
  --t-small:   400 14px/1.5  var(--font-sans);
  --t-meta:    500 12px/1.4  var(--font-sans);
  --t-code:    400 14px/1.55 var(--font-mono);
  --t-eyebrow: 600 12px/1.2  var(--font-sans);
}

/* ------- SPACE / RADIUS / SHADOW ------- */
:root {
  --space-1: 4px;  --space-2: 8px;  --space-3: 12px;
  --space-4: 16px; --space-5: 24px; --space-6: 32px;
  --space-7: 48px; --space-8: 64px; --space-9: 96px; --space-10: 128px;

  --radius-xs: 4px;  --radius-sm: 8px;   --radius-md: 12px;
  --radius-lg: 18px; --radius-xl: 28px;  --radius-pill: 999px;

  --shadow-1: 0 1px 0 rgba(20,20,18,0.04), 0 1px 2px rgba(20,20,18,0.05);
  --shadow-2: 0 1px 0 rgba(20,20,18,0.04), 0 4px 12px rgba(20,20,18,0.06);
  --shadow-3: 0 2px 0 rgba(20,20,18,0.03), 0 12px 32px rgba(20,20,18,0.08);
  --shadow-emerald: 0 6px 24px rgba(16,185,129,0.18);
}

/* ------- RESET + BASE ------- */
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg-1); }
html { -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
body { font: var(--t-body); }
a { color: inherit; text-decoration: underline; text-decoration-thickness: 1px;
    text-underline-offset: 3px; text-decoration-color: var(--stone-300); }
a:hover { text-decoration-color: var(--fg-1); }

/* ------- RESPONSIVE UTILITIES ------- */
@media (max-width: 900px) {
  .hide-mobile { display: none !important; }
  .grid-2col { grid-template-columns: 1fr !important; }
  .grid-3col { grid-template-columns: 1fr !important; }
  .grid-4col { grid-template-columns: repeat(2, 1fr) !important; }
  .grid-5col { grid-template-columns: repeat(2, 1fr) !important; }
}
@media (max-width: 600px) {
  .grid-4col { grid-template-columns: 1fr !important; }
  .grid-5col { grid-template-columns: 1fr !important; }
  .grid-pricing { grid-template-columns: 1fr !important; }
}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<!-- =================== COMPONENTS =================== -->
<script type="text/babel" data-presets="env,react">
/* eslint-disable */
const { useState, useEffect, useRef } = React;

/* -------- Mark + Lockup -------- */
const MARK_BIG   = "M 158 14 C 210 18 232 70 224 130 C 218 178 188 212 142 218 C 102 222 76 198 70 162 C 64 124 86 78 118 44 C 130 28 144 16 158 14 Z";
const MARK_SMALL = "M 84 232 C 110 234 122 256 116 282 C 110 308 86 322 62 312 C 44 304 38 282 50 262 C 60 244 72 232 84 232 Z";

function SanaaMark({ size = 28, color = "currentColor", style }) {
  return (
    <svg viewBox="0 0 240 340" fill={color}
      style={{ height: size, width: "auto", display: "block", flexShrink: 0, ...style }}
      aria-label="Sanaa">
      <path d={MARK_BIG} />
      <path d={MARK_SMALL} />
    </svg>
  );
}

function SanaaLockup({ height = 22, color = "currentColor" }) {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 10, color }}>
      <SanaaMark size={height + 4} color={color} />
      <span style={{ font: `700 ${height - 2}px var(--font-sans)`, letterSpacing: "-0.02em" }}>sanaa</span>
    </div>
  );
}

/* -------- Primitives -------- */
function Eyebrow({ children, color, style }) {
  return (
    <span style={{
      font: "var(--t-eyebrow)", letterSpacing: "0.14em", textTransform: "uppercase",
      color: color || "var(--fg-3)", display: "block", ...style,
    }}>{children}</span>
  );
}

function Button({ variant = "primary", size = "md", children, onClick, style, as: As = "button", href }) {
  const base = {
    font: size === "sm" ? "600 13px/1 var(--font-sans)" : "600 15px/1 var(--font-sans)",
    padding: size === "sm" ? "10px 16px" : "14px 22px",
    borderRadius: 999, border: "1px solid transparent", cursor: "pointer",
    transition: "background .15s ease, border-color .15s ease, color .15s ease",
    textDecoration: "none", display: "inline-flex", alignItems: "center", gap: 6,
  };
  const vstyles = {
    primary:   { background: "var(--emerald-500)", color: "#fff" },
    secondary: { background: "transparent", color: "var(--ink)", borderColor: "var(--stone-300)" },
    dark:      { background: "var(--ink)", color: "#fff" },
    onDark:    { background: "rgba(255,255,255,0.12)", color: "#fff", borderColor: "rgba(255,255,255,0.2)" },
    ghost:     { background: "transparent", color: "var(--ink)", borderColor: "transparent" },
  };
  const props = As === "a" ? { href, onClick } : { onClick };
  return (
    <As {...props}
      style={{ ...base, ...vstyles[variant], ...style }}
      onMouseEnter={e => {
        if (variant === "primary")   e.currentTarget.style.background = "var(--emerald-600)";
        if (variant === "secondary") e.currentTarget.style.borderColor = "var(--ink)";
        if (variant === "dark")      e.currentTarget.style.background = "var(--stone-800)";
        if (variant === "onDark")    e.currentTarget.style.background = "rgba(255,255,255,0.2)";
        if (variant === "ghost")     e.currentTarget.style.background = "var(--paper-soft)";
      }}
      onMouseLeave={e => Object.assign(e.currentTarget.style, vstyles[variant])}
    >{children}</As>
  );
}

function Tag({ tone = "stone", children }) {
  const tones = {
    emerald: { background: "var(--emerald-50)", color: "var(--emerald-800)", borderColor: "var(--emerald-100)" },
    ink:     { background: "var(--ink)", color: "#fff", borderColor: "transparent" },
    stone:   { background: "var(--paper-soft)", color: "var(--fg-2)", borderColor: "var(--border)" },
    gold:    { background: "#fbf3df", color: "#7a5a14", borderColor: "#f2e1aa" },
    clay:    { background: "#fbe9e0", color: "#7a3a1f", borderColor: "#f2c8b3" },
  };
  return (
    <span style={{
      display: "inline-flex", alignItems: "center", gap: 6,
      font: "600 12px var(--font-sans)", padding: "5px 10px",
      borderRadius: 999, border: "1px solid transparent", ...tones[tone],
    }}>{children}</span>
  );
}

/* -------- TopNav -------- */
function TopNav({ onNavigate, current }) {
  const [open, setOpen] = useState(null);
  const [scrolled, setScrolled] = useState(false);

  useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 8);
    window.addEventListener("scroll", onScroll, { passive: true });
    return () => window.removeEventListener("scroll", onScroll);
  }, []);

  const items = [
    { id: "products", label: "Products", menu: [
      { name: "Soko 24",        sub: "Marketplace and services platform",         href: "#" },
      { name: "Baraka 24",      sub: "Logistics operating system",                href: "#" },
      { name: "Cooperative",    sub: "Member-owned finance base",                 href: "#cooperative" },
      { name: "Sanaa Finance",  sub: "Software for SACCOs and lenders",           href: "#" },
      { name: "Sanaa Cloud",    sub: "Managed hosting and storage",               href: "#" },
      { name: "Sanaa Cards",    sub: "Corporate payment cards",                   href: "#" },
    ]},
    { id: "company", label: "Company", menu: [
      { name: "About Us",       sub: "Our story, values, and the team",           href: "#" },
      { name: "Careers",        sub: "Join us in building African commerce",      href: "#" },
      { name: "Partners",       sub: "Our ecosystem of integrated partners",      href: "#" },
      { name: "Investor Relations", sub: "Financial news and shareholder info",   href: "#" },
      { name: "Blog",           sub: "Latest insights and updates",               href: "#blog" },
    ]},
  ];

  return (
    <header style={{
      position: "sticky", top: 0, zIndex: 50,
      background: scrolled ? "#fbfaf7" : "rgba(251,250,247,0.92)",
      borderBottom: scrolled ? "1px solid var(--border)" : "1px solid transparent",
      transition: "border-color .2s, background .2s",
    }}>
      <div style={{
        maxWidth: 1200, margin: "0 auto", padding: "14px 24px",
        display: "flex", alignItems: "center", gap: 28,
      }}>
        <a onClick={() => onNavigate("home")}
          style={{ cursor: "pointer", textDecoration: "none", display: "flex" }}>
          <SanaaLockup height={22} color="var(--ink)" />
        </a>

        <nav style={{ display: "flex", gap: 4, position: "relative" }}>
          {items.map(it => (
            <div key={it.id}
              onMouseEnter={() => setOpen(it.id)}
              onMouseLeave={() => setOpen(null)}
              style={{ position: "relative" }}>
              <button style={{
                font: "500 14px var(--font-sans)", color: open === it.id ? "var(--ink)" : "var(--fg-2)",
                background: "transparent", border: 0, cursor: "pointer", padding: "8px 12px",
                borderRadius: 8, transition: "color .15s, background .15s",
              }}
                onMouseEnter={e => e.currentTarget.style.color = "var(--ink)"}
                onMouseLeave={e => e.currentTarget.style.color = open === it.id ? "var(--ink)" : "var(--fg-2)"}
              >{it.label} <span style={{ color: "var(--fg-mute)", fontSize: 10, marginLeft: 2 }}>▾</span></button>

              {open === it.id && (
                <div style={{ position: "absolute", top: "100%", left: -16, marginTop: 0, paddingTop: 8, width: 460 }}>
                  <div style={{
                    background: "#fff", border: "1px solid var(--border)",
                    borderRadius: 18, boxShadow: "var(--shadow-3)", padding: 16,
                    display: "grid", gridTemplateColumns: "1fr 1fr", gap: 4,
                  }}>
                    {it.menu.map(m => (
                      <a key={m.name} href={m.href} style={{
                        padding: "10px 12px", borderRadius: 10, textDecoration: "none",
                        display: "flex", flexDirection: "column", gap: 2, transition: "background .12s",
                      }}
                        onMouseEnter={e => e.currentTarget.style.background = "var(--paper-soft)"}
                        onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                        <span style={{ font: "600 14px var(--font-sans)", color: "var(--ink)" }}>{m.name}</span>
                        <span style={{ font: "var(--t-meta)", color: "var(--fg-3)" }}>{m.sub}</span>
                      </a>
                    ))}
                  </div>
                </div>
              )}
            </div>
          ))}

          <a onClick={() => onNavigate("pricing")}
            style={{
              font: "500 14px var(--font-sans)",
              color: current === "pricing" ? "var(--ink)" : "var(--fg-2)",
              cursor: "pointer", padding: "8px 12px", borderRadius: 8, textDecoration: "none",
              transition: "color .15s",
            }}
            onMouseEnter={e => e.currentTarget.style.color = "var(--ink)"}
            onMouseLeave={e => e.currentTarget.style.color = current === "pricing" ? "var(--ink)" : "var(--fg-2)"}
          >Pricing</a>
        </nav>

        <div style={{ flex: 1 }} />
        <a style={{
          font: "500 14px var(--font-sans)", color: "var(--ink)",
          textDecoration: "none", cursor: "pointer",
        }}>Sign in</a>
        <Button variant="dark" size="sm" onClick={() => alert("Contact form — placeholder.")}>Contact Sales</Button>
      </div>
    </header>
  );
}

/* -------- Hero -------- */
function Hero() {
  return (
    <section style={{ position: "relative", overflow: "hidden", background: "var(--ink)", color: "#fff" }}>
      {/* Faux video background */}
      <div aria-hidden style={{
        position: "absolute", inset: 0,
        background: [
          "radial-gradient(120% 80% at 20% 20%, rgba(16,185,129,0.18), transparent 60%)",
          "radial-gradient(80% 60% at 80% 80%, rgba(200,155,60,0.10), transparent 60%)",
          "var(--ink)",
        ].join(", "),
      }} />
      <div aria-hidden style={{
        position: "absolute", inset: 0, opacity: .18,
        background: "repeating-linear-gradient(135deg, rgba(255,255,255,0.04) 0 2px, transparent 2px 8px)",
      }} />

      <div style={{ position: "relative", maxWidth: 1200, margin: "0 auto", padding: "120px 24px 96px" }}>
        {/* Building since badge */}
        <div style={{
          display: "inline-flex", alignItems: "center", gap: 10,
          padding: "6px 14px", border: "1px solid rgba(255,255,255,0.18)",
          borderRadius: 999, marginBottom: 28,
        }}>
          <span style={{ width: 6, height: 6, borderRadius: 999, background: "var(--emerald-400)", flexShrink: 0 }} />
          <span style={{ font: "var(--t-meta)", letterSpacing: "0.1em", textTransform: "uppercase" }}>Building since 2021</span>
        </div>

        <h1 style={{
          font: "700 clamp(44px, 7vw, 88px)/0.98 var(--font-sans)",
          letterSpacing: "-0.035em", maxWidth: 1000, margin: "0 0 28px",
        }}>
          Sanaa builds finance, commerce, logistics,
          <br />
          and infrastructure{" "}
          <span style={{ color: "var(--emerald-400)" }}>for African business</span>.
        </h1>

        <p style={{
          font: "var(--t-body-lg)", color: "rgba(255,255,255,0.72)",
          maxWidth: 620, margin: "0 0 40px",
        }}>
          Registered in Uganda. Active in Uganda and DRC. One hundred percent founder-owned.
        </p>

        <div style={{ display: "flex", gap: 14, flexWrap: "wrap" }}>
          <Button variant="primary" style={{ boxShadow: "var(--shadow-emerald)" }}>Work with us →</Button>
          <Button variant="onDark">If you are evaluating this space, we are open to a conversation</Button>
        </div>

        <div style={{
          display: "flex", gap: 24, marginTop: 64, flexWrap: "wrap",
          color: "rgba(255,255,255,0.45)", font: "var(--t-meta)",
          letterSpacing: "0.14em", textTransform: "uppercase",
        }}>
          {["Finance", "Commerce", "Logistics", "Infrastructure"].map((w, i, a) => (
            <React.Fragment key={w}>
              <span>{w}</span>
              {i < a.length - 1 && <span>·</span>}
            </React.Fragment>
          ))}
        </div>
      </div>
    </section>
  );
}

/* -------- BuildSoFar -------- */
function BuildSoFar() {
  const items = [
    "Building since 2021",
    "Cooperative registered and operational since 2022",
    "Active in Uganda and DRC",
    "Live B2B logistics client running cross-border",
    "Financial software deployed with institutions",
    "100% founder-owned",
    "Three registered legal entities",
    "Team of six",
  ];
  return (
    <section style={{ maxWidth: 1200, margin: "0 auto", padding: "96px 24px" }}>
      <Eyebrow>The Build So Far</Eyebrow>
      <h2 style={{ font: "var(--t-h1)", letterSpacing: "-0.02em", marginTop: 12, marginBottom: 40 }}>
        Where we are, in plain numbers.
      </h2>
      <div className="grid-4col" style={{
        display: "grid", gridTemplateColumns: "repeat(4, 1fr)",
        borderTop: "1px solid var(--border)",
      }}>
        {items.map(t => (
          <div key={t} style={{
            padding: "20px 16px 24px",
            borderBottom: "1px solid var(--border)",
            borderRight: "1px solid var(--border)",
          }}>
            <div style={{ font: "var(--t-body)", color: "var(--ink)" }}>{t}</div>
          </div>
        ))}
      </div>
    </section>
  );
}

/* -------- Cooperative -------- */
function Cooperative() {
  return (
    <section id="cooperative" style={{ background: "var(--paper-soft)", padding: "96px 24px" }}>
      <div className="grid-2col" style={{
        maxWidth: 1200, margin: "0 auto",
        display: "grid", gridTemplateColumns: "1fr 1fr", gap: 64, alignItems: "start",
      }}>
        <div>
          <Eyebrow color="var(--gold)">Member-owned, not VC-owned</Eyebrow>
          <h2 style={{ font: "var(--t-h1)", letterSpacing: "-0.02em", marginTop: 12, marginBottom: 24 }}>
            Built on ownership, not just access.
          </h2>
          <div style={{ display: "flex", flexDirection: "column", gap: 18 }}>
            <p style={{
              margin: 0, font: "var(--t-editorial-2)", color: "var(--fg-2)",
            }}>
              Most technology companies sell tools to African businesses. Sanaa is different. We built a financial institution first.
            </p>
            <p style={{
              margin: 0, font: "var(--t-editorial-2)", color: "var(--fg-2)",
            }}>
              The Sanaa Finance Cooperative was registered in Uganda in 2022 and is fully operational. Sellers on Soko 24, logistics operators on Baraka 24, and clients of Sanaa Media are not just customers. They are owners.
            </p>
          </div>
        </div>

        <div style={{
          background: "#fff", border: "1px solid var(--border)",
          borderRadius: 18, padding: 32, boxShadow: "var(--shadow-1)",
        }}>
          <Eyebrow>What members access today</Eyebrow>
          <ul style={{ listStyle: "none", padding: 0, margin: "20px 0 0", display: "flex", flexDirection: "column", gap: 18 }}>
            {[
              ["Cash credit facilities",  "Working capital and daily business operations."],
              ["Asset financing",          "Motorbike financing already running for delivery and logistics members."],
              ["Financial literacy",       "Shapes how members manage money, stock, and growth."],
            ].map(([h, b]) => (
              <li key={h} style={{ display: "flex", gap: 16 }}>
                <div style={{
                  width: 8, height: 8, borderRadius: 999, background: "var(--emerald-500)",
                  marginTop: 8, flexShrink: 0,
                }} />
                <div>
                  <div style={{ font: "var(--t-h4)", color: "var(--ink)" }}>{h}</div>
                  <div style={{ font: "var(--t-small)", color: "var(--fg-3)", marginTop: 2 }}>{b}</div>
                </div>
              </li>
            ))}
          </ul>
        </div>
      </div>
    </section>
  );
}

/* -------- ProductGrid -------- */
function ProductCard({ tag, title, body }) {
  const [hovered, setHovered] = useState(false);
  return (
    <a href="#" style={{
      background: "#fff", border: `1px solid ${hovered ? "var(--border-strong)" : "var(--border)"}`,
      borderRadius: 18, padding: 28, textDecoration: "none",
      display: "flex", flexDirection: "column", gap: 12,
      boxShadow: hovered ? "var(--shadow-2)" : "var(--shadow-1)",
      transition: "border-color .15s, box-shadow .15s",
    }}
      onMouseEnter={() => setHovered(true)}
      onMouseLeave={() => setHovered(false)}
    >

/* -------- Router / App -------- */
function App() {
  const [screen, setScreen] = useState("home");
  const navigate = (s) => { setScreen(s); window.scrollTo({ top: 0, behavior: "smooth" }); };

  return (
    <div style={{ background: "var(--bg)", minHeight: "100vh" }}>
      <TopNav onNavigate={navigate} current={screen} />
      {screen === "home"    && <HomeScreen onNavigate={navigate} onOpenPost={() => navigate("post")} />}
      {screen === "post"    && <JournalPostScreen onBack={() => navigate("home")} />}
      {screen === "pricing" && <PricingScreen />}
      <Footer />
    </div>
  );
}
